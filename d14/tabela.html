<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Tabela</title>
    <style>
        body{
            font-family: Arial, Helvetica, sans-serif;
        }
        table{

border-collapse: collapse;

        }
        tr,td,th{
            padding: 10px;
            border: 1px solid black;
        }
        
        td{
            border: 1px solid black;
     

        }
      th{
border: 1px solid black;
background-color: rgb(148, 148, 148);
color: white;
      }
      td.ex{
        text-align: center;
        font-weight: bold;
      }
td.center{
    text-align: center;
}
th.left{
    text-align: left;
}
    </style>
</head>
<body>
    <table>
        <tr>
        <th rowspan="2" class="1">Área</th>
        <th rowspan="2">Disciplinas</th>
        <th colspan="2" class="2">Notas</th>
        <th rowspan="2">Média</th>
        </tr>
        <tr>
        <th>Nota 1</th>
        <th>Nota 2</th>
    </tr>
    <tr>
        <td rowspan="4" class="ex">Exatas</td>
        <td>Matemática</td>
        <td class="center">0.0</td>
        <td class="center">0.0</td>
        <td class="center">0.0</td>
        </tr>
        <tr>
        <td>Física</td>
        <td class="center">0.0</td>
        <td class="center">0.0</td>
        <td class="center">0.0</td>
        </tr>
        <tr>
            <td>Química</td>
            <td class="center">0.0</td>
            <td class="center">0.0</td>
            <td class="center">0.0</td>
        </tr>
        <tr>
            <td>Biologia</td>
            <td class="center">0.0</td>
            <td class="center">0.0</td>
            <td class="center">0.0</td>
        </tr>
        <tr>
        
<th colspan="4" class="left">Média de Exatas</th>
        <th class="center">0.0</th>

    </tr>

        <tr>
        <td rowspan="2" class="ex">Humanas</td>
        <td>História</td>
        <td class="center">0.0</td>
        <td class="center">0.0</td>
        <td class="center">0.0</td>
       </tr>
       <tr>
        <td>Geografia</td>
        <td class="center">0.0</td>
        <td class="center">0.0</td>
        <td class="center">0.0</td>
       </tr>
       <tr>
        <th colspan="4" class="left">Média de Humanas</th>
        <th class="center">0.0</th>
       </tr>
    </table>
</body>
</html>
