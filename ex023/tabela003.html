<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Tabelas </title>
    <style>
        body{
            font-family: Arial, Helvetica, sans-serif;
        }
        table{
border-collapse: collapse;
width: 300px;
        }
        td{
            border: 1px solid black;
            padding: 10px;
            text-align: center;
        }
    </style>
</head>
<body>
    <h1>Mesclagem de células</h1>
    <table>
        <tr>
        <td>J</td>
        <td>H</td>
        <td>O</td>
        <td>N</td>
        <td>A</td>
        <td>T</td>
        <td rowspan="5">A</td>
        
    </tr>

        <tr>
        <td>S</td>
        <td>A</td>
        <td>N</td>
        <td>T</td>
        <td>O</td>
        <td rowspan="4">S</td>
        </tr>

        <tr>
       <td colspan="3">D</td>
       <td colspan="2">A</td>
       
       
        </tr>

        <tr>
       
        <td>S</td>
        <td colspan="10">I</td>
        <td>L</td>
        <td>V</td>
        <td>A</td>
        </tr>

    </table>
</body>
</html>
