<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Tabelas 02</title>
    <style>
body{
font-family: Arial, Helvetica, sans-serif;
}

table{
    width: 400px;

    border-collapse: separate;
}
tr,td{
    text-align: center;
border: 1px solid black;
padding: 10px;
}
    </style>
</head>
<body>
    <table>
        <tr>
            <td colspan="4">A</td>

            <td rowspan="4">B</td>
        </tr>
        <tr>
            <td rowspan="4">C</td>
            <td>D</td>
            <td>E</td>
            <td>F</td>
        </tr>
        <td>G</td>
        <td>H</td>
        <td>I</td>
        <tr>
            <td>J</td>
            <td>K</td>
            <td>L</td>
            <tr>
            <td colspan="4">
            M
            </td>
            </tr>
        </tr>
    </table>
</body>
</html>
