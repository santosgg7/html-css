<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Formulário</title>
</head>
<body>
  <h1>Exemplo De Formulario</h1> 
  <form action="cadastro.php" method="post">
    <p>
        <label for="iest"> Estado</label>
        <select name="Estado" id="iest">
            <option value=""select> ESCOLHA</option>

            <optgroup label="Região Sudeste">
                <option value="Rj"> RIO DE JANEIRO</option>
                <option value="SP">SÂO PAULO</option>
                <option value="MG">MINAS GERAIS</option>
            </optgroup>
            <optgroup label="Região Nordeste">
                <option value="MA">MARANHÃO</option>
                <option value="PE">PERNAMBUCO</option>
            </optgroup>
        </select>
    </p>
    <p>
        <label for="iprof"> Profissão:</label>
        <input type="text" name="prof" id="iprof" list="lst">
        <datalist id="lst">
            <option value="DEV">Desenvolvedor</option>
        </datalist>
    </p>
    <p>
        <label for="imeg">Mensagem:</label><br>
        <textarea name="msg" id="imeg" cols="30" rows="10"></textarea>
    </p>
    <p>
        <input type="submit" value="Enviar">
        <input type="reset" value="Limpar">
    </p>
  </form>
</body>
</html>
